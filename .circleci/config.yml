version: 2.1
orbs:
  elixir: membraneframework/elixir@1

jobs:
  rust_lint:
    docker:
      - image: rust:latest
    steps:
      - checkout
      - run:
          name: Install rustfmt and clippy
          command: rustup component add rustfmt clippy
      - run:
          name: Check formatting
          command: cargo fmt --check
      - run:
          name: Run clippy
          command: cargo clippy -- -D warnings

workflows:
  version: 2
  build:
    jobs:
      - rust_lint:
          filters: &filters
            tags:
              only: /v.*/
      - elixir/build_test:
          filters:
            <<: *filters
      - elixir/test:
          filters:
            <<: *filters
      - elixir/lint:
          filters:
            <<: *filters
      - elixir/hex_publish:
          requires:
            - elixir/build_test
            - elixir/test
            - elixir/lint
          context:
            - Deployment
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /v.*/
